# Make C-a escape
unbind C-b
set -g prefix C-a
bind a send-prefix

set -g mode-keys vi

# Set TERM
set -g default-terminal "tmux-256color"
set -as terminal-features ",kitty*:RGB"

# Colors
set -g status-bg "#16161D"
set -g status-fg "#DCD7BA"
set -g status-left ""
set -g status-right "#[fg=#DCD7BA]#H"

# Highlight active window
set-window-option -g window-status-current-style fg="#C0A36E"

# Clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy && wl-paste -n | wl-copy -p"
bind-key C-y run "wl-paste -n | tmux load-buffer - ; tmux paste-buffer"

# Window title
set -g set-titles on
