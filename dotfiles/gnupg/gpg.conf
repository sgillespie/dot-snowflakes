# Adapted from: https://github.com/drduh/YubiKey-Guide/blob/master/config/gpg.conf
#
# Also see:
#  * https://www.gnupg.org/documentation/manuals/gnupg/GPG-Options.html
#  * 'gpg --version' to get capabilities
#

## Cryptographic options
#
# Use AES256, 192, or 128 as cipher
personal-cipher-preferences AES256 AES192 AES
# Use SHA512, 384, or 256 as digest
personal-digest-preferences SHA512 SHA384 SHA256
# Use ZLIB, BZIP2, ZIP, or no compression
personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed
# Default preferences for new keys
default-preference-list SHA512 SHA384 SHA256 AES256 AES192 AES ZLIB BZIP2 ZIP Uncompressed
# SHA512 as digest to sign keys
cert-digest-algo SHA512
# SHA512 as digest for symmetric ops
s2k-digest-algo SHA512
# AES256 as cipher for symmetric ops
s2k-cipher-algo AES256

## Formatting options
#
charset utf-8
no-comments
no-emit-version
no-greeting
keyid-format 0xlong
# Display UID validity and expired/revoked keys
list-options show-uid-validity,show-unusable-subkeys
verify-options show-uid-validity
with-fingerprint
# Display key origins and updates
with-key-origin
# Always output in ASCII instead of binary
armor

## Hardening and restrictions
#
# Cross-certify subkeys are present and valid
require-cross-certification
# Enforce memory locking to avoid accidentally swapping GPG memory to disk
require-secmem
# Disable caching of passphrase for symmetrical ops
no-symkey-cache

## Trust delegation
#
trust-model tofu+pgp
